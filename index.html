<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#070D1A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MedBill AI"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>MedBill AI</title>

<!-- PWA Manifest via blob -->
<script>
const manifest = {
  name: "MedBill AI – Medical Analyzer",
  short_name: "MedBill AI",
  description: "Analyze medical bills, get medicine info, set reminders",
  start_url: "./",
  display: "standalone",
  background_color: "#070D1A",
  theme_color: "#00D4AA",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='38' fill='%23070D1A'/%3E%3Ctext x='96' y='130' font-size='110' text-anchor='middle'%3E%F0%9F%92%8A%3C/text%3E%3C/svg%3E", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%23070D1A'/%3E%3Ctext x='256' y='350' font-size='300' text-anchor='middle'%3E%F0%9F%92%8A%3C/text%3E%3C/svg%3E", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const manifestUrl = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest'; link.href = manifestUrl;
document.head.appendChild(link);
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#070D1A; --card:#0E1726; --card2:#131F30; --border:#1A2840;
  --accent:#00D4AA; --adim:rgba(0,212,170,0.12); --aborder:rgba(0,212,170,0.25);
  --warn:#FF6B6B; --gold:#FFD166; --gdim:rgba(255,209,102,0.09);
  --text:#E2EDF8; --muted:#6B82A0; --sub:#9BB0C8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);font-family:'Sora',sans-serif;color:var(--text);overflow-x:hidden;}
button,input,textarea,select{font-family:'Sora',sans-serif;color:var(--text);}
button{cursor:pointer;border:none;background:none;}
button:active{transform:scale(0.96);}
input,textarea{background:none;border:none;outline:none;}
textarea{resize:none;}
img{display:block;max-width:100%;}

/* Scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes glow{0%,100%{opacity:0.6}50%{opacity:1}}
@keyframes ripple{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2.5);opacity:0}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
.fadeUp{animation:fadeUp 0.4s ease both;}
.slideIn{animation:slideIn 0.3s ease both;}

/* ── Layout ── */
#app{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;}

/* Safe area for notch phones */
.safe-top{padding-top:env(safe-area-inset-top,16px);}
.safe-bottom{padding-bottom:env(safe-area-inset-bottom,16px);}

/* ── Top Nav ── */
.topnav{
  position:sticky;top:0;z-index:100;
  background:rgba(7,13,26,0.92);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid var(--border);
  padding:14px 18px 10px;
  padding-top:calc(14px + env(safe-area-inset-top,0px));
  display:flex;align-items:center;gap:12px;
}
.nav-logo{font-size:22px;}
.nav-title{font-size:16px;font-weight:800;flex:1;}
.nav-badge{background:var(--adim);border:1px solid var(--aborder);color:var(--accent);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:.08em;}

/* ── Bottom Tab Bar ── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(10,16,30,0.96);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,8px);
}
.tabbar-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px 6px;font-size:11px;font-weight:600;color:var(--muted);
  transition:color 0.2s;
}
.tabbar-btn.active{color:var(--accent);}
.tabbar-btn .tb-icon{font-size:20px;line-height:1;}
.tabbar-indicator{
  position:absolute;top:0;height:2px;background:var(--accent);
  transition:left 0.25s cubic-bezier(.4,0,.2,1),width 0.25s;
  border-radius:0 0 4px 4px;
}

/* ── Scroll Content ── */
.content{flex:1;overflow-y:auto;padding:0 16px 120px;}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;}
.card+.card{margin-top:12px;}
.sec-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:22px 0 10px;}

/* ── Upload Zone ── */
.upload-zone{
  border:2px dashed var(--border);border-radius:20px;background:var(--card);
  padding:36px 20px;text-align:center;transition:all 0.2s;margin-top:16px;
}
.upload-zone.drag{border-color:var(--accent);background:var(--adim);}
.upload-emoji{font-size:52px;display:block;margin-bottom:16px;}
.upload-title{font-size:17px;font-weight:800;margin-bottom:6px;}
.upload-sub{color:var(--muted);font-size:14px;margin-bottom:18px;line-height:1.5;}
.file-tags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
.file-tag{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:3px 10px;font-size:12px;color:var(--sub);font-family:monospace;}

/* ── Buttons ── */
.btn-primary{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(135deg,#00D4AA,#0097A7);color:#fff;
  border-radius:14px;padding:15px 24px;font-size:15px;font-weight:700;
  transition:opacity .2s;width:100%;
}
.btn-primary:disabled{opacity:.5;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;}
.btn-ghost{background:var(--adim);border:1px solid var(--aborder);color:var(--accent);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;}
.btn-danger{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);color:var(--warn);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;}

/* ── Preview ── */
.preview-wrap{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--border);background:var(--card);margin-top:14px;}
.preview-img{width:100%;max-height:260px;object-fit:contain;background:#070D1A;}
.pdf-preview{display:flex;align-items:center;gap:14px;padding:22px;}
.pdf-icon{font-size:38px;flex-shrink:0;}
.remove-btn{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.78);color:#fff;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;}

/* ── Spinner ── */
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top:4px solid var(--accent);border-radius:50%;animation:spin .85s linear infinite;margin:0 auto 18px;}
.loading-card{text-align:center;padding:44px 20px;}

/* ── Medicine card ── */
.med-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:16px;padding:16px 18px;margin-bottom:10px;}
.med-name{font-size:16px;font-weight:800;}
.med-generic{font-size:13px;color:var(--muted);margin-top:3px;}
.med-badge{background:var(--adim);color:var(--accent);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:700;border:1px solid var(--aborder);white-space:nowrap;}
.med-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;}
.med-grid-item{background:var(--bg);border-radius:10px;padding:8px 12px;border:1px solid var(--border);}
.mg-label{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;}
.mg-val{font-size:13px;font-weight:700;}
.timing-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.timing-chip{background:rgba(255,209,102,.09);border:1px solid rgba(255,209,102,.2);color:var(--gold);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:600;}
.warn-box{background:rgba(255,107,107,.07);border:1px solid rgba(255,107,107,.2);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--warn);margin-top:8px;line-height:1.6;}
.disclaimer{margin-top:20px;padding:12px 16px;border-radius:12px;background:var(--gdim);border:1px solid rgba(255,209,102,.14);font-size:12px;color:#9A8A50;line-height:1.6;text-align:center;}

/* ── Chat ── */
.chat-wrap{margin-top:20px;}
.chat-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:glow 2s ease infinite;}
.chat-title{font-size:15px;font-weight:800;flex:1;}
.chat-box{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;}
.suggest-row{display:flex;gap:6px;overflow-x:auto;padding:12px 14px 4px;scrollbar-width:none;}
.suggest-row::-webkit-scrollbar{display:none;}
.suggest-chip{background:var(--adim);border:1px solid var(--aborder);color:var(--accent);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.chat-msgs{height:300px;overflow-y:auto;padding:14px 14px 6px;}
.msg-row{display:flex;align-items:flex-end;margin-bottom:10px;}
.msg-row.user{justify-content:flex-end;}
.bubble{max-width:80%;border-radius:16px;padding:10px 14px;font-size:14px;line-height:1.6;}
.bubble.ai{background:#111F33;border:1px solid var(--border);color:#C4D4E8;border-top-left-radius:4px;}
.bubble.user{background:linear-gradient(135deg,#00D4AA,#0097A7);color:#fff;border-top-right-radius:4px;}
.ava{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.ava.ai{background:var(--adim);border:1px solid var(--aborder);margin-right:7px;}
.ava.user{background:rgba(0,150,200,.2);border:1px solid rgba(0,150,200,.3);margin-left:7px;}
.typing-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--muted);margin:0 2px;animation:pulse 1.2s ease infinite;}
.chat-input-row{display:flex;gap:8px;align-items:flex-end;padding:11px 13px;border-top:1px solid var(--border);background:#0A1520;}
.chat-ta{flex:1;background:transparent;color:var(--text);font-size:14px;line-height:1.5;max-height:90px;padding:2px 0;}
.send-btn{background:linear-gradient(135deg,#00D4AA,#0097A7);border-radius:11px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.send-off{background:var(--border)!important;}

/* ── Reminders ── */
.reminder-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);}
.reminder-item:last-child{border-bottom:none;}
.ri-info{flex:1;}
.ri-name{font-size:14px;font-weight:700;}
.ri-times{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;}
.ri-time-chip{background:var(--gdim);border:1px solid rgba(255,209,102,.15);color:var(--gold);border-radius:7px;padding:2px 8px;font-size:11px;font-weight:600;}
.toggle-wrap{position:relative;width:44px;height:24px;border-radius:12px;flex-shrink:0;transition:background .2s;}
.toggle-knob{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;pointer-events:none;}
.active-label{display:inline-flex;align-items:center;gap:6px;background:var(--adim);border:1px solid var(--aborder);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--accent);margin-top:6px;font-weight:600;}
.pulse-ring{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);position:relative;}
.pulse-ring::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;background:var(--accent);animation:ripple 1.5s ease infinite;}

/* ── Share ── */
.share-code{font-size:32px;font-weight:800;letter-spacing:.28em;color:var(--accent);text-align:center;padding:20px;background:var(--adim);border-radius:14px;border:1px solid var(--aborder);margin:14px 0;font-family:monospace;}
.share-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:16px;color:var(--text);letter-spacing:.1em;text-transform:uppercase;font-family:monospace;}
.share-info{font-size:13px;color:var(--muted);line-height:1.6;margin:12px 0;}
.notif-banner{display:flex;align-items:center;gap:12px;background:var(--gdim);border:1px solid rgba(255,209,102,.2);border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.nb-icon{font-size:22px;flex-shrink:0;}
.nb-title{font-size:13px;font-weight:700;color:var(--gold);}
.nb-sub{font-size:12px;color:var(--muted);}

/* ── Floating alerts ── */
#alerts{position:fixed;top:calc(70px + env(safe-area-inset-top,0px));right:12px;left:12px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.alert-item{background:var(--accent);color:#fff;border-radius:14px;padding:14px 16px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:10px;box-shadow:0 8px 28px rgba(0,0,0,.5);pointer-events:auto;}

/* ── Install banner ── */
#install-banner{display:none;position:fixed;bottom:calc(60px + env(safe-area-inset-bottom,0px));left:12px;right:12px;z-index:99;background:linear-gradient(135deg,#00D4AA,#0097A7);border-radius:18px;padding:16px 18px;color:#fff;box-shadow:0 8px 30px rgba(0,0,0,.5);}
.ib-row{display:flex;align-items:center;gap:12px;}
.ib-icon{font-size:28px;}
.ib-title{font-size:15px;font-weight:800;flex:1;}
.ib-sub{font-size:12px;opacity:.85;margin-top:2px;}
.ib-btns{display:flex;gap:8px;margin-top:12px;}
.ib-install{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:10px;padding:9px 18px;font-size:13px;font-weight:700;flex:1;}
.ib-dismiss{background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);border-radius:10px;padding:9px 18px;font-size:13px;font-weight:600;}

/* ── Error ── */
.err-box{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.3);border-radius:16px;padding:18px;text-align:center;color:var(--warn);font-size:14px;margin-top:12px;}

/* ── Onboarding hero ── */
.hero{text-align:center;padding:32px 16px 24px;}
.hero-pill{display:inline-flex;align-items:center;gap:6px;background:var(--adim);color:var(--accent);border-radius:999px;padding:5px 16px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;border:1px solid var(--aborder);}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:glow 2s ease infinite;}
.hero-h1{font-size:clamp(26px,7vw,36px);font-weight:800;line-height:1.12;background:linear-gradient(135deg,var(--text) 20%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;}
.hero-sub{color:var(--muted);font-size:14px;max-width:320px;margin:0 auto;line-height:1.65;}
.features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:20px 0;}
.feature-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:left;}
.feature-icon{font-size:22px;margin-bottom:8px;}
.feature-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.feature-sub{font-size:12px;color:var(--muted);line-height:1.4;}

/* ── Code entry panel ── */
.code-entry{margin-top:16px;}
.or-divider{text-align:center;color:var(--muted);font-size:13px;margin:20px 0;position:relative;}
.or-divider::before,.or-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.or-divider::before{left:0;}
.or-divider::after{right:0;}
.code-row{display:flex;gap:8px;}
</style>
</head>
<body>
<div id="app">
  <!-- Top Nav -->
  <nav class="topnav safe-top">
    <span class="nav-logo">💊</span>
    <span class="nav-title">MedBill AI</span>
    <span class="nav-badge" id="nav-badge" style="display:none"></span>
  </nav>

  <!-- Alerts -->
  <div id="alerts"></div>

  <!-- Install banner -->
  <div id="install-banner">
    <div class="ib-row">
      <span class="ib-icon">💊</span>
      <div><div class="ib-title">Install MedBill AI</div><div class="ib-sub">Add to your home screen for quick access</div></div>
    </div>
    <div class="ib-btns">
      <button class="ib-install" id="btn-install">Install App</button>
      <button class="ib-dismiss" id="btn-dismiss">Later</button>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="content" id="content">
    <!-- Tab panels filled by JS -->
  </div>

  <!-- Bottom Tab Bar (shown after analysis) -->
  <nav class="tabbar" id="tabbar" style="display:none">
    <div class="tabbar-indicator" id="tab-indicator"></div>
    <button class="tabbar-btn active" id="tb-analyze" onclick="switchTab('analyze')">
      <span class="tb-icon">📋</span>Analysis
    </button>
    <button class="tabbar-btn" id="tb-reminders" onclick="switchTab('reminders')">
      <span class="tb-icon">⏰</span>Reminders
    </button>
    <button class="tabbar-btn" id="tb-share" onclick="switchTab('share')">
      <span class="tb-icon">🔗</span>Share
    </button>
    <button class="tabbar-btn" id="tb-chat" onclick="switchTab('chat')">
      <span class="tb-icon">💬</span>Chat
    </button>
  </nav>
</div>

<script>
/* ══════════════════════════════════════════
   SERVICE WORKER REGISTRATION
══════════════════════════════════════════ */
const swCode = `
self.addEventListener('install', e => self.skipWaiting());
self.addEventListener('activate', e => clients.claim());
self.addEventListener('fetch', e => {
  if(e.request.url.includes('googleapis.com') || e.request.url.includes('fonts.google')) {
    e.respondWith(fetch(e.request).catch(()=>new Response('offline',{status:503})));
    return;
  }
  e.respondWith(caches.open('medbill-v1').then(c=>c.match(e.request).then(r=>r||fetch(e.request))));
});
`;
const swBlob = new Blob([swCode], {type:'text/javascript'});
const swUrl = URL.createObjectURL(swBlob);
if('serviceWorker' in navigator) navigator.serviceWorker.register(swUrl);

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let state = {
  file: null,
  result: null,
  reminders: {},
  msgs: [],
  activeTab: 'analyze',
  shareCode: null,
  notifPerm: Notification ? Notification.permission : 'denied',
  reminderTimers: [],
  apiKey: localStorage.getItem('gemini_api_key') || '',
};

/* Gemini API helper */
async function geminiCall(systemPrompt, parts, history=[]) {
  const key = state.apiKey;
  if(!key) throw new Error('NO_KEY');
  // Use gemini-1.5-flash with generateContent
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

  // Build contents array — inject system prompt as first user turn for reliability
  const contents = [];
  if(history.length === 0) {
    // First turn: prepend system instructions to the parts
    contents.push({
      role: 'user',
      parts: [{text: '[INSTRUCTIONS]\n' + systemPrompt + '\n[/INSTRUCTIONS]\n\n'}, ...parts]
    });
  } else {
    // Multi-turn chat: put system in first user message
    const firstParts = [{text: '[INSTRUCTIONS]\n' + systemPrompt + '\n[/INSTRUCTIONS]\n\n' + history[0].content}];
    contents.push({role: 'user', parts: firstParts});
    for(let i = 1; i < history.length; i++) {
      contents.push({
        role: history[i].role === 'assistant' ? 'model' : 'user',
        parts: [{text: history[i].content}]
      });
    }
    contents.push({role: 'user', parts});
  }

  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents,
      generationConfig: {maxOutputTokens: 2048, temperature: 0.1}
    })
  });

  const data = await res.json();

  // Surface Gemini errors clearly
  if(data.error) {
    const msg = data.error.message || JSON.stringify(data.error);
    throw new Error('Gemini: ' + msg);
  }

  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!text) throw new Error('Gemini returned empty response. Check your API key.');
  return text;
}

/* Extract JSON robustly from Gemini response */
function extractJSON(raw) {
  // Try direct parse first
  try { return JSON.parse(raw.trim()); } catch(e){}
  // Strip markdown code fences
  const stripped = raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  try { return JSON.parse(stripped); } catch(e){}
  // Find first { ... } block
  const match = raw.match(/\{[\s\S]*\}/);
  if(match) { try { return JSON.parse(match[0]); } catch(e){} }
  throw new Error('Could not parse JSON from response');
}

function saveApiKey(k) {
  state.apiKey = k.trim();
  localStorage.setItem('gemini_api_key', state.apiKey);

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function genCode() { return Math.random().toString(36).substring(2,8).toUpperCase(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(t) { return esc(t).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'); }

function showAlert(msg, dur=6000) {
  const div = document.createElement('div');
  div.className='alert-item slideIn';
  div.innerHTML=`<span style="font-size:20px">💊</span> ${esc(msg)}`;
  document.getElementById('alerts').appendChild(div);
  setTimeout(()=>div.remove(), dur);
}

function parseTime(s) {
  if(!s) return null;
  const m = s.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
  if(m) {
    let h=parseInt(m[1]),min=parseInt(m[2]);
    if(m[3]){ if(/pm/i.test(m[3])&&h!==12)h+=12; if(/am/i.test(m[3])&&h===12)h=0; }
    return {h,min};
  }
  if(/morning/i.test(s)) return {h:8,min:0};
  if(/afternoon/i.test(s)) return {h:13,min:0};
  if(/evening/i.test(s)) return {h:18,min:0};
  if(/night|bed/i.test(s)) return {h:21,min:0};
  return null;
}

/* ══════════════════════════════════════════
   REMINDER SCHEDULER
══════════════════════════════════════════ */
function scheduleReminders() {
  state.reminderTimers.forEach(clearInterval);
  state.reminderTimers = [];
  if(!state.result?.medicines) return;
  state.result.medicines.forEach(med => {
    if(!state.reminders[med.name]) return;
    (med.timing||[]).forEach(timeStr => {
      const t = parseTime(timeStr);
      if(!t) return;
      const id = setInterval(()=>{
        const now = new Date();
        if(now.getHours()===t.h && now.getMinutes()===t.min) {
          const msg = `Take ${med.name}${med.dosage?' ('+med.dosage+')':''}`;
          if(state.notifPerm==='granted') new Notification('💊 Medicine Time', {body:msg, icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💊</text></svg>'});
          showAlert(msg);
        }
      }, 30000);
      state.reminderTimers.push(id);
    });
  });
}

/* ══════════════════════════════════════════
   FILE HANDLING
══════════════════════════════════════════ */
function handleFile(f) {
  if(!f) return;
  const isPDF = f.type==='application/pdf';
  const isImg = f.type.startsWith('image/');
  if(!isPDF && !isImg) { showError('analyze','Please upload a JPG, PNG, or PDF file.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    state.file = {name:f.name, base64:e.target.result.split(',')[1], mimeType:f.type, type:isPDF?'pdf':'image', preview:isImg?e.target.result:null};
    state.result=null; state.msgs=[]; state.shareCode=null; state.reminders={};
    document.getElementById('tabbar').style.display='none';
    renderAnalyzeTab();
  };
  reader.readAsDataURL(f);
}

/* ══════════════════════════════════════════
   ANALYSIS
══════════════════════════════════════════ */
async function analyze() {
  if(!state.file) return;
  if(!state.apiKey){ renderAnalyzeTab(); setTimeout(()=>showError('analyze','⚠️ Please enter your Gemini API key first (see the yellow box above).'),50); return; }
  renderLoading();

  const filePart = {inline_data:{mime_type: state.file.mimeType, data: state.file.base64}};

  try {
    const systemPrompt = `You are a medical document analyzer. The user will send you a medical bill, prescription, or discharge summary.
Your task: Extract ALL medicine and health information and return ONLY a single valid JSON object.

Return this exact JSON structure with real values filled in (no placeholders):
{"patient_name":null,"doctor_name":null,"hospital":null,"date":null,"diagnosis":null,"medicines":[{"name":"MedicineName","generic_name":null,"category":"e.g. Antibiotic","purpose":"what it treats","dosage":"e.g. 500mg","frequency":"e.g. Twice daily","duration":null,"form":"e.g. Tablet","timing":["Morning - 8:00 AM","Night - 9:00 PM"],"instructions":"e.g. Take after food","warnings":[]}],"general_instructions":null,"follow_up":null,"total_amount":null}

Rules:
- Return ONLY the JSON. No explanations, no markdown, no code fences.
- Extract every single medicine listed.
- If timing is not specified, suggest based on frequency (Once daily = Morning 8AM, Twice = Morning + Night, Three times = Morning/Afternoon/Night).
- If it is not a medical document at all, return: {"error":"Not a medical document"}`;

    const raw = await geminiCall(systemPrompt, [
      filePart,
      {text: 'Analyze this medical document. Return only the JSON object.'}
    ]);

    const parsed = extractJSON(raw);

    if(parsed.error) {
      state.file = null;
      renderAnalyzeTab();
      setTimeout(()=>showError('upload', parsed.error), 50);
      return;
    }

    state.result = parsed;
    const diagText = parsed.diagnosis ? ' for **' + parsed.diagnosis + '**' : '';
    state.msgs = [{role:'assistant', content:'Hi! I analyzed your ' + (state.file.type==='pdf'?'PDF':'medical bill') + '. Found ' + (parsed.medicines?.length||0) + ' medicine(s)' + diagText + '. Ask me anything about your medicines! Reminders tab is available too.'}];
    const r = {};
    (parsed.medicines||[]).forEach(m => { r[m.name] = false; });
    state.reminders = r;
    document.getElementById('nav-badge').style.display = '';
    document.getElementById('nav-badge').textContent = `${parsed.medicines?.length||0} meds`;
    document.getElementById('tabbar').style.display = 'flex';
    switchTab('analyze');

  } catch(e) {
    console.error('Analyze error:', e);
    renderAnalyzeTab();
    // Show actual error so user knows what's wrong
    const msg = e.message === 'NO_KEY'
      ? 'Please enter your Gemini API key first.'
      : e.message.includes('API_KEY_INVALID') || e.message.includes('API key')
        ? '❌ Invalid API key. Please check your Gemini key and try again.'
        : e.message.includes('quota') || e.message.includes('QUOTA')
          ? '❌ API quota exceeded. Try again later.'
          : '❌ ' + (e.message || 'Unknown error. Please try again.');
    setTimeout(()=>showError('analyze', msg), 50);
  }
}

function generateShareCode() {
  if(!state.result) return;
  const code = genCode();
  try {
    localStorage.setItem('share_'+code, JSON.stringify(state.result));
    state.shareCode = code;
  } catch(e) { state.shareCode = code; }
  renderShareTab();
}

function loadFromCode(code) {
  const stored = localStorage.getItem('share_'+code.toUpperCase());
  if(stored) {
    state.result = JSON.parse(stored);
    afterLoad();
    return true;
  }
  return false;
}

function afterLoad() {
  const r={};
  (state.result.medicines||[]).forEach(m=>{ r[m.name]=false; });
  state.reminders=r;
  state.msgs=[{role:'assistant',content:`Loaded shared bill! Found **${state.result.medicines?.length||0} medicine(s)**${state.result.diagnosis?` for **${state.result.diagnosis}**`:''}.`}];
  document.getElementById('nav-badge').style.display='';
  document.getElementById('nav-badge').textContent=`${state.result.medicines?.length||0} meds`;
  document.getElementById('tabbar').style.display='flex';
  switchTab('analyze');
}

/* ══════════════════════════════════════════
   CHAT
══════════════════════════════════════════ */
async function sendChat(override) {
  const taEl = document.getElementById('chat-ta');
  const text = override || (taEl?taEl.value:'');
  if(!text.trim()) return;
  if(taEl){taEl.value=''; taEl.style.height='auto';}
  state.msgs.push({role:'user',content:text.trim()});
  renderChat(true);

  const ctx = state.result
    ? `Medicines: ${(state.result.medicines||[]).map(m=>`${m.name} ${m.dosage||''} ${m.frequency||''}`).join('; ')}, Diagnosis: ${state.result.diagnosis||'N/A'}`
    : '';

  try {
    const allMsgs = state.msgs; // includes the user msg we just pushed
    const sysPrompt = `You are a friendly, knowledgeable medical assistant. Answer questions about the user's medicines and medical bill clearly in simple language. Be concise but helpful. Always remind users to consult their doctor for personalized advice. ${ctx}`;
    // Pass all previous messages as history, current message as the parts
    const history = allMsgs.slice(0, -1);
    const lastMsg = allMsgs[allMsgs.length - 1];
    const reply = await geminiCall(sysPrompt, [{text: lastMsg.content}], history);
    state.msgs.push({role:'assistant', content: reply || 'Sorry, I could not process that. Please try again.'});
  } catch(e) {
    if(e.message==='NO_KEY') state.msgs.push({role:'assistant',content:'⚠️ Please set your Gemini API key first.'});
    else state.msgs.push({role:'assistant',content:'❌ Error: ' + (e.message||'Something went wrong. Please try again.')});
  }
  renderChat(false);
}

      ${items}
    </div>
    <div class="disclaimer" style="margin-top:10px">🔔 Keep this app open for reminders to work. Notifications must be allowed in your browser settings.</div>
  </div>`;
}

/* ── Share Tab ── */
function renderShareTab() {
  const c = document.getElementById('content');
  if(!state.result) {
    c.innerHTML=`
    <div class="fadeUp">
      <div class="sec-label">🔗 Load Shared Bill</div>
      <div class="card">
        <p style="font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.6">Enter a 6-character code to load a shared bill</p>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          <input class="share-input" id="share-code-input" placeholder="E.g. A3X9KL" maxlength="6" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')loadCode2()">
          <button class="btn-primary" style="width:auto;padding:12px 18px" onclick="loadCode2()">Load</button>
        </div>
        <div id="err-share2" style="color:var(--warn);font-size:13px;display:none"></div>
      </div>
    </div>`;
    return;
  }

  const code = state.shareCode;

  c.innerHTML = `
  <div class="fadeUp">
    <div class="sec-label">🔗 Share This Bill</div>
    <div class="card">
      <p style="font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:16px">Share your bill analysis with family, caregivers, or your doctor using a 6-character code.</p>
      ${!code ? `<button class="btn-primary" onclick="generateShareCode()">🔗 Generate Share Code</button>` : `
        <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px">Share this code:</div>
        <div class="share-code">${code}</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button class="btn-ghost" style="flex:1" onclick="copyCode()">📋 Copy Code</button>
          <button class="btn-outline" style="flex:1" onclick="generateShareCode()">🔄 New Code</button>
        </div>
        <div style="font-size:12px;color:var(--muted);text-align:center">Anyone with this code can enter it in the app to load this analysis</div>
      `}
    </div>
  </div>`;
}

/* ── Chat Tab ── */
function renderChatTab() {
  const c = document.getElementById('content');
  const SUGG = ["Side effects?","Can I take together?","Miss a dose?","Food restrictions?","How to store?"];
  c.innerHTML = `
  <div class="fadeUp">
    <div class="chat-wrap">
      <div class="chat-header">
        <div class="online-dot"></div>
        <div class="chat-title">Ask about your medicines</div>
      </div>
      <div class="chat-box">
        ${state.msgs.length<=1?`<div class="suggest-row">${SUGG.map(s=>`<button class="suggest-chip" onclick="sendChat('${s}')">${s}</button>`).join('')}</div>`:''}
        <div class="chat-msgs scroll" id="chat-msgs">${renderMessages()}</div>
        <div class="chat-input-row">
          <textarea class="chat-ta" id="chat-ta" rows="1" placeholder="Ask about side effects, dosage…"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px'"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendChat()">➤</button>
        </div>
      </div>
    </div>
  </div>`;
  scrollChatBottom();
}

function renderMessages() {
  return state.msgs.map(m => `
    <div class="msg-row ${m.role==='user'?'user':''}">
      ${m.role==='assistant'?'<div class="ava ai">🏥</div>':''}
      <div class="bubble ${m.role==='assistant'?'ai':'user'}">${fmt(m.content)}</div>
      ${m.role==='user'?'<div class="ava user">👤</div>':''}
    </div>`).join('');
}

function renderChat(loading) {
  if(state.activeTab!=='chat') return;
  const el = document.getElementById('chat-msgs');
  if(!el) return;
  el.innerHTML = renderMessages();
  if(loading) el.innerHTML += `<div class="msg-row"><div class="ava ai">🏥</div><div class="bubble ai" style="padding:12px 14px"><span class="typing-dot"></span><span class="typing-dot" style="animation-delay:.2s"></span><span class="typing-dot" style="animation-delay:.4s"></span></div></div>`;
  scrollChatBottom();
}

function scrollChatBottom() {
  setTimeout(()=>{ const el=document.getElementById('chat-msgs'); if(el) el.scrollTop=el.scrollHeight; },50);
}

/* ══════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════ */
function applyKey() {
  const el = document.getElementById('key-input');
  const k = el ? el.value.trim() : '';
  if(!k) { showAlert('Please paste your API key first'); return; }
  saveApiKey(k);
  showAlert('✅ API key saved! You can now analyze bills.');
  renderContent();
}

function clearKey() {
  state.apiKey = '';
  localStorage.removeItem('gemini_api_key');
  renderContent();
}

function resetAll() {
  state.file=null; state.result=null; state.msgs=[]; state.shareCode=null; state.reminders={};
  state.reminderTimers.forEach(clearInterval); state.reminderTimers=[];
  document.getElementById('tabbar').style.display='none';
  document.getElementById('nav-badge').style.display='none';
  switchTab('analyze');
}

function toggleReminder(name) {
  if(state.notifPerm!=='granted' && !state.reminders[name]) {
    Notification.requestPermission().then(p=>{ state.notifPerm=p; state.reminders[name]=true; scheduleReminders(); renderRemindersTab(); });
    return;
  }
  state.reminders[name] = !state.reminders[name];
  scheduleReminders();
  renderRemindersTab();
}

function reqNotif() {
  Notification.requestPermission().then(p=>{ state.notifPerm=p; renderRemindersTab(); });
}

function loadCode() {
  const el = document.getElementById('code-input');
  if(!el) return;
  const code = el.value.trim().toUpperCase();
  if(!code) return;
  const ok = loadFromCode(code);
  if(!ok) {
    const errEl = document.getElementById('err-code');
    if(errEl){errEl.style.display='';errEl.textContent='⚠️ Code not found. Check and try again.';}
  }
}

function loadCode2() {
  const el = document.getElementById('share-code-input');
  if(!el) return;
  const code = el.value.trim().toUpperCase();
  const ok = loadFromCode(code);
  if(!ok) {
    const errEl = document.getElementById('err-share2');
    if(errEl){errEl.style.display='';errEl.textContent='⚠️ Code not found.';}
  }
}

function generateShareCode() {
  if(!state.result) return;
  const code = genCode();
  try { localStorage.setItem('share_'+code, JSON.stringify(state.result)); } catch(e){}
  state.shareCode = code;
  renderShareTab();
}

function copyCode() {
  navigator.clipboard.writeText(state.shareCode||'').then(()=>showAlert('Share code copied! 📋',3000));
}

/* Global file input handler (exposed to HTML) */
window.handleFile = handleFile;

/* ── Initial render ── */
renderContent();
</script>
</body>
</html>
